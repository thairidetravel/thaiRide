<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Service">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */

.hero{
position:relative;
margin-top:20px;
overflow:hidden;
}

.hero-slide img{
width:100%;
border-radius:10px;
display:none;
}

.hero-slide img.active{
display:block;
}

.clock{
position:absolute;
top:20px;
right:20px;
font-size:26px;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:10px;
}

/* BOOKING */

.booking{
background:#1e293b;
padding:30px;
border-radius:12px;
margin-top:40px;
}

.booking-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.booking input,
.booking select,
.booking textarea{
padding:14px;
border-radius:8px;
border:none;
width:100%;
font-size:15px;
}

.booking button{
margin-top:15px;
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

/* QR */

.qr-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
text-align:center;
}

.qr-box img{
width:140px;
background:white;
padding:8px;
border-radius:10px;
}

/* VEHICLES */

.vehicles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.vehicle{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.vehicle img{
width:100%;
border-radius:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.line-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:40px;
text-align:center;
opacity:0.7;
}

@media(max-width:768px){

.gallery,
.vehicles,
.qr-box,
.booking-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h1>ThaiRide Travel</h1>
</div>

<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="hero-slide">
<img src="heroslide_01.png" class="active">
<img src="heroslide_02.png">
<img src="heroslide_03.png">
</div>

<div class="clock">
<div id="clock"></div>
</div>

</section>

<!-- BOOKING FORM (โค้ดของคุณ) -->

<section class="booking">

<h2>🚐 Airport Transfer Booking</h2>

<form action="https://formsubmit.co/nine623@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<div class="booking-grid">

<div>
<label>Name</label>
<input type="text" name="Name" required>
</div>

<div>
<label>Contact</label>
<input type="text" name="Contact" required>
</div>

<div>
<label>Pickup Location</label>
<input type="text" name="Pickup">
</div>

<div>
<label>Dropoff Location</label>
<input type="text" name="Dropoff">
</div>

<div>
<label>Date</label>
<input type="date" id="date" name="Date">
</div>

<div>
<label>Time</label>
<input type="time" id="time" name="Time">
</div>

<div>
<label>Passengers</label>
<select name="Passengers">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>
</div>

<div>
<label>Vehicle</label>
<select name="Vehicle">
<option>Toyota Altis</option>
<option>SUV</option>
<option>VIP Van</option>
</select>
</div>

</div>

<label>Message</label>
<textarea name="Message"></textarea>

<button type="submit">Book Now</button>

</form>

<!-- QR -->

<div class="qr-box">

<div>
<h3>LINE</h3>
<img src="line-qr.png">
</div>

<div>
<h3>WhatsApp</h3>
<img src="whatsapp-qr.png">
</div>

<div>
<h3>WeChat</h3>
<img src="wechat-qr.png">
</div>

</div>

</section>

<!-- VEHICLES -->

<h2>Our Vehicles</h2>

<div class="vehicles">

<div class="vehicle">
<img src="altis.png">
<h3>Toyota Altis</h3>
</div>

<div class="vehicle">
<img src="suv.png">
<h3>SUV</h3>
</div>

<div class="vehicle">
<img src="van.png">
<h3>VIP Van</h3>
</div>

</div>

<!-- GALLERY -->

<section id="gallery">

<h2>Gallery</h2>

<div class="gallery">

<img src="G-01.png">
<img src="G-02.png">
<img src="G-03.png">
<img src="G-04.png">
<img src="hero_05.png">
<img src="hero_06.png">

</div>

</section>

<footer>

©2026 ThaiRide Travel

</footer>

</div>

<a href="https://line.me/R/ti/p/@775hjmvl" class="line-btn">
LINE Booking
</a>

<script>

/* CLOCK */

function updateClock(){
let now=new Date();
document.getElementById("clock").innerHTML=now.toLocaleTimeString();
}
setInterval(updateClock,1000);

/* HERO SLIDE */

let slideIndex=0;
let slides=document.querySelectorAll(".hero-slide img");

function showSlide(){

slides.forEach(img=>img.classList.remove("active"));

slideIndex++;

if(slideIndex>slides.length){slideIndex=1;}

slides[slideIndex-1].classList.add("active");

}

setInterval(showSlide,4000);

/* AUTO DATE TIME */

document.addEventListener("DOMContentLoaded",function(){

let now=new Date()

let yyyy=now.getFullYear()
let mm=String(now.getMonth()+1).padStart(2,'0')
let dd=String(now.getDate()).padStart(2,'0')

document.getElementById("date").value=yyyy+"-"+mm+"-"+dd

let hh=String(now.getHours()).padStart(2,'0')
let min=String(now.getMinutes()).padStart(2,'0')

document.getElementById("time").value=hh+":"+min

});

</script>

</body>
</html>
