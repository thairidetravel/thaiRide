<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer Private Taxi & Thailand Tour</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Service. Safari World Tour, Floating Market Tour and VIP Van Service in Thailand.">

<meta name="keywords" content="Bangkok Airport Transfer, Private Taxi Bangkok, Safari World Tour, Floating Market Tour">

<meta name="robots" content="index, follow">

<!-- Google Analytics -->

<script async src="https://www.googletagmanager.com/gtag/js?id=G-V9XCVN1N0W"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-V9XCVN1N0W');
</script>

<!-- GoatCounter -->

<script data-goatcounter="https://thairidetravel.goatcounter.com/count"
async src="//gc.zgo.at/count.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

.hero img{
width:100%;
border-radius:10px;
}

.clock{
position:absolute;
top:20px;
right:20px;
font-size:26px;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:10px;
}

.scroll{
overflow:hidden;
white-space:nowrap;
margin-top:25px;
}

.scroll span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
color:#38bdf8;
font-size:22px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.date-center{
text-align:center;
margin-top:10px;
}

#time{
font-size:24px;
color:#38bdf8;
}

.visitor-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
text-align:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

footer{
margin-top:40px;
text-align:center;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h1>ThaiRide Travel</h1>
</div>

</header>

<section class="hero">

<img src="hero_01.png">

<div class="clock" id="clock"></div>

</section>

<div class="scroll">
<span>
Premium Airport Transfer • Safari World Tour • Floating Market Tour • Bangkok Private Car Service
</span>
</div>

<div class="date-center">

<div id="date"></div>
<div id="time"></div>

</div>

<h2 style="text-align:center;margin-top:40px;">
🌍 Website Visitors
</h2>

<div class="visitor-box">

<div class="card">
<h3>Total Visitors</h3>
<h2 id="total-visits">Loading...</h2>
</div>

<div class="card">
<h3>Device</h3>
<h2 id="device"></h2>
</div>

<div class="card">
<h3>Browser</h3>
<h2 id="browser"></h2>
</div>

</div>

<section>

<h2>Photo Gallery</h2>

<div class="gallery">

<img src="G-01.png">
<img src="G-02.png">
<img src="G-03.png">
<img src="G-04.png">
<img src="hero_05.png">
<img src="hero_06.png">

</div>

</section>

<footer>

©2026 ThaiRide Travel

</footer>

</div>

<script>

function updateClock(){

let now = new Date();

let time = now.toLocaleTimeString();
let date = now.toLocaleDateString("en-US",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
});

document.getElementById("clock").innerHTML=time
document.getElementById("time").innerHTML=time
document.getElementById("date").innerHTML=date

}

updateClock()
setInterval(updateClock,1000)

</script>

<script>

let device="Desktop";

if(/Android/i.test(navigator.userAgent)) device="Android";
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)) device="iOS";

document.getElementById("device").innerHTML=device

let browser="Unknown";

if(navigator.userAgent.indexOf("Chrome")>-1) browser="Chrome";
if(navigator.userAgent.indexOf("Safari")>-1) browser="Safari";
if(navigator.userAgent.indexOf("Firefox")>-1) browser="Firefox";

document.getElementById("browser").innerHTML=browser

</script>

<script>

fetch("https://YOURCODE.goatcounter.com/counter/TOTAL.json")

.then(res=>res.json())

.then(data=>{

document.getElementById("total-visits").innerText=data.count

})

</script>

</body>
</html>
