<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อจองรถ | Thai Ride Travel</title>

<meta name="description" content="จองรถ VIP Airport Transfer และ Private Tour ผ่าน LINE Official Account ได้ทันที">
<meta name="keywords" content="จองรถ, รถรับส่งสนามบิน, Private Tour Thailand">

<link rel="stylesheet" href="style.css">

<style>

/* HERO */
.hero img{
width:100%;
max-height:300px;
object-fit:cover;
}

/* FORM */

.form-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:600px;
margin:auto;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea{

width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;

}

/* BUTTON */

.book-btn{

background:#00b900;
color:white;
padding:14px 20px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
text-decoration:none;
display:inline-block;

}

.book-btn:hover{
background:#009900;
}

/* SIDEBAR */

.sidebar{

position:fixed;
left:10px;
top:120px;
width:180px;
background:black;
color:white;
padding:15px;
border-radius:15px;
font-size:14px;

}

/* MOBILE */

@media(max-width:768px){

.sidebar{
display:none;
}

}

footer{
text-align:center;
padding:20px;
background:#0b2c4a;
color:white;
margin-top:40px;
}

</style>

</head>

<body>

<header style="padding:20px;background:#0b2c4a;color:white">

<h2>Thai Ride Travel</h2>

<nav>
<a href="index.html" style="color:white;margin-right:20px">หน้าแรก</a>
<a href="tour.html" style="color:white;margin-right:20px">สถานที่ท่องเที่ยว</a>
<a href="contact.html" style="color:white">ติดต่อเรา</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<img src="contact-header.png">

</section>

<section style="padding:40px;text-align:center">

<h2>ติดต่อจองรถ</h2>

<p style="font-size:18px">
งานด่วน กรุณาทัก LINE Official Account เท่านั้น
</p>

<br>

<img src="line-qr.png" width="200">

<br><br>

<a href="https://lin.ee/zmoafDZ" class="book-btn">
ทัก LINE เพื่อจองรถ
</a>

<br><br><br>

<!-- FORM -->

<div class="form-box">

<form id="bookingForm">

<label>ชื่อผู้จอง</label>
<input type="text" id="name" required>

<label>วันที่เดินทาง</label>
<input type="date" id="date" required>

<label>เวลาเดินทาง</label>
<input type="time" id="time" required>

<label>จุดรับ</label>
<input type="text" id="pickup" required>

<label>จุดส่ง</label>
<input type="text" id="dropoff" required>

<label>ประเภทรถ</label>

<select id="car">

<option>Alphard</option>
<option>Camry</option>
<option>SUV</option>
<option>Van</option>

</select>

<label>จำนวนผู้โดยสาร</label>
<input type="number" id="passenger" min="1">

<label>หมายเหตุ</label>
<textarea id="note"></textarea>

<br><br>

<button type="submit" class="book-btn" style="width:100%">
ส่งข้อมูล
</button>

</form>

</div>

</section>


<!-- SIDEBAR CLOCK -->

<div class="sidebar">

<div id="dateBox"></div>
<div id="timeBox"></div>
<div id="visitBox"></div>
<div id="countryBox"></div>

</div>

<footer>

© 2025 Thai Ride Travel

</footer>


<script>

/* CLOCK */

function updateClock(){

let now = new Date()

let date = now.toLocaleDateString("th-TH")

let time = now.toLocaleTimeString("th-TH")

document.getElementById("dateBox").innerHTML="📅 "+date
document.getElementById("timeBox").innerHTML="⏰ "+time

}

setInterval(updateClock,1000)


/* VISITS */

let visit = localStorage.getItem("visitCount") || 0
visit++
localStorage.setItem("visitCount",visit)

document.getElementById("visitBox").innerHTML="👀 Visits : "+visit

/* COUNTRY */

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("countryBox").innerHTML="🌍 "+data.country_name
})


/* FORM → LINE */

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("name").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value
let pickup=document.getElementById("pickup").value
let dropoff=document.getElementById("dropoff").value
let car=document.getElementById("car").value
let passenger=document.getElementById("passenger").value
let note=document.getElementById("note").value

let message=
`จองรถ Thai Ride Travel

ชื่อ : ${name}

วันที่ : ${date}

เวลา : ${time}

รับ : ${pickup}

ส่ง : ${dropoff}

รถ : ${car}

ผู้โดยสาร : ${passenger}

หมายเหตุ : ${note}`

let url="https://line.me/R/oaMessage/@zmoafdz/?"+encodeURIComponent(message)

window.open(url,"_blank")

})

</script>

</body>
</html>
