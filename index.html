<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThaiRide Travel | รถเช่าพร้อมคนขับ กรุงเทพ</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V9XCVN1N0W"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body,html{
margin:0;
padding:0;
font-family:'Kanit',sans-serif;
color:white;
overflow-x:hidden;
background:black;
}

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
filter:brightness(40%);
}

.container{
text-align:center;
padding:120px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:gold;
cursor:pointer;
font-weight:bold;
}

.section{
background:#111;
padding:60px 20px;
text-align:center;
}

.review{
animation:scroll 25s linear infinite;
white-space:nowrap;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

form input, form select, textarea{
padding:12px;
margin:10px;
width:260px;
border-radius:10px;
border:none;
}

.footer{
background:black;
padding:30px;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<!-- Luxury Background Video -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-luxury-car-driving-1573/1080p.mp4" type="video/mp4">
</video>

<div class="container">
<h1>ThaiRide Travel</h1>
<p>Luxury SUV พร้อมคนขับมืออาชีพ</p>
<button onclick="document.getElementById('booking').scrollIntoView()">จองรถตอนนี้</button>
</div>

<div class="section">
<h2>รีวิวลูกค้า</h2>
<div class="review">
⭐ บริการดีมาก ⭐ รถสะอาด ⭐ ตรงเวลา ⭐ คนขับสุภาพ ⭐ ประทับใจมาก ⭐ จะใช้บริการอีกแน่นอน ⭐
</div>
</div>

<div class="section" id="booking">
<h2>จองวันเวลา</h2>

<form action="https://formsubmit.co/nine623@gmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="มีลูกค้าจองรถใหม่ ThaiRide">

<input type="text" name="ชื่อลูกค้า" placeholder="ชื่อลูกค้า" required><br>

<input type="tel" name="เบอร์ติดต่อกลับ" placeholder="เบอร์ติดต่อกลับ" required><br>

<input type="text" name="สถานที่รับ" placeholder="สถานที่รับ (โรงแรม/สนามบิน)" required><br>

<input type="text" name="เบอร์ห้อง" placeholder="เบอร์ห้อง (ถ้ามี)"><br>

<input type="date" name="วันที่เดินทาง" required><br>

<input type="time" name="เวลาเดินทาง" required><br>

<select name="เส้นทาง" required>
<option value="">เลือกเส้นทาง</option>
<option>สนามบินสุวรรณภูมิ</option>
<option>พัทยา</option>
<option>อยุธยา</option>
</select><br>

<textarea name="หมายเหตุ" placeholder="หมายเหตุเพิ่มเติม"></textarea><br>

<button type="submit">จองและส่งข้อมูล</button>
</form>

</div>

<div class="section">
<h2>ชำระมัดจำออนไลน์</h2>
<p>โอนผ่าน QR ด้านล่าง และส่งสลิปทาง LINE</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ThaiRideDeposit"
style="margin:20px;border-radius:20px;">

<p>LINE: nine623</p>
</div>

<div class="footer">
© 2026 ThaiRide Travel | รถเช่าพร้อมคนขับ กรุงเทพ
</div>

</body>
</html>
