<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:75px;
}

.logo-text{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */

.hero img{
width:100%;
border-radius:10px;
}

/* VEHICLE */

.vehicle-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.vehicle{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.vehicle img{
width:100%;
}

/* BOOKING FORM */

.booking-section{
background:#1e293b;
padding:30px;
border-radius:10px;
margin-top:50px;
}

.booking-section h2{
text-align:center;
margin-bottom:20px;
}

.booking-form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.booking-form input,
.booking-form select,
.booking-form textarea{

padding:12px;
border:none;
border-radius:6px;
font-size:15px;
}

.booking-form textarea{
grid-column:1/3;
}

.booking-form button{

grid-column:1/3;

background:#f97316;
color:white;
padding:14px;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

footer{
margin-top:60px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo_01.png">
<div class="logo-text">ThaiRide Travel</div>
</div>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Tours</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">
<img src="heroslide_01.png">
</section>

<h2 style="margin-top:40px">Vehicle Types</h2>

<div class="vehicle-grid">

<div class="vehicle">
<img src="altis.png">
<h3>Sedan</h3>
</div>

<div class="vehicle">
<img src="suv.png">
<h3>SUV</h3>
</div>

<div class="vehicle">
<img src="van.png">
<h3>VIP Van</h3>
</div>

</div>


<!-- BOOKING FORM -->

<section class="booking-section">

<h2>🚐 Car Booking Form</h2>

<form class="booking-form" id="bookingForm">

<input type="text" name="name" placeholder="Full Name" required>

<input type="tel" name="phone" placeholder="Phone / WhatsApp" required>

<input type="email" name="email" placeholder="Email">

<input type="number" name="passengers" placeholder="Passengers">

<input type="text" name="pickup" placeholder="Pickup Location">

<input type="text" name="dropoff" placeholder="Dropoff Location">

<input type="date" name="date">

<input type="time" name="time">

<textarea name="note" placeholder="Extra Note"></textarea>

<button type="submit">BOOK NOW</button>

</form>

</section>


<footer>

<img src="logo_01.png" height="70"><br><br>

Contact ThaiRide Travel

<br><br>

© 2026 ThaiRide Travel

</footer>

</div>


<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault()

let formData = new FormData(this)

fetch("https://hook.us2.make.com/dcdi4g4ngoujz5utnld3hv2ny5u7ebco",{

method:"POST",
body:formData

})

.then(()=>{

alert("Booking Sent Successfully!")

window.location.reload()

})

.catch(()=>{

alert("Error sending booking")

})

})

</script>


</body>
</html>
