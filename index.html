<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiRide Travel</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
    text-align:center;
}

.container{
    padding:40px 20px;
}

h1{
    color:#00ff88;
}

.subtitle{
    margin-bottom:30px;
    opacity:0.8;
}

/* BUTTON STYLE */
.btn{
    display:block;
    width:90%;
    max-width:400px;
    margin:12px auto;
    padding:15px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    color:#fff;
}

.red{background:#ff2d2d;}
.green{background:#00cc44;}
.blue{background:#2d6cff;}
.dark{
    background:#111;
    border:1px solid #00ff88;
}

/* FORM SECTION */
.form-section{
    background:#111;
    padding:40px 20px;
    margin-top:40px;
}

input, select{
    width:90%;
    max-width:400px;
    padding:12px;
    margin:8px auto;
    border-radius:8px;
    border:none;
    display:block;
}

button{
    width:90%;
    max-width:400px;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:30px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

footer{
    padding:20px;
    background:#000;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
    <h1>ThaiRide</h1>
    <div class="subtitle">บริการรับส่งสนามบินระดับพรีเมียม</div>

    <a href="tel:0800000000" class="btn red">📞 โทรตอนนี้</a>
    <a href="#" class="btn green">💬 จองผ่าน LINE</a>
    <a href="#booking" class="btn blue">📍 นำทางไปสนามบิน</a>
    <a href="#booking" class="btn dark">📄 ดูราคา</a>
    <a href="#booking" class="btn dark">🚗 เลือกรถ</a>
</div>

<div class="form-section" id="booking">
    <h2>จองวันเวลา</h2>

    <form action="https://formsubmit.co/701ccff07f0e8ba67ba495a336f05c45" method="POST">

        <input type="text" name="name" placeholder="ชื่อของคุณ" required>
        <input type="tel" name="phone" placeholder="เบอร์โทร" required>

        <select name="route" required>
            <option value="">เลือกเส้นทาง</option>
            <option>สนามบิน → กรุงเทพ</option>
            <option>กรุงเทพ → สนามบิน</option>
        </select>

        <select name="car" required>
            <option value="">เลือกรถ</option>
            <option>Sedan</option>
            <option>SUV</option>
            <option>Van</option>
        </select>

        <button type="submit">จองและชำระมัดจำ</button>

    </form>
</div>

<footer>
© 2026 ThaiRide Travel | รถเช่าพร้อมคนขับ กรุงเทพ
</footer>

</body>
</html>
