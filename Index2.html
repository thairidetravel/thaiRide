<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ThaiRide Travel | New Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ================= 1. ล็อคขอบจอแบบเด็ดขาด (Style จาก BBC) ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden !important; 
  background: #121212; /* เปลี่ยนเป็นพื้นหลังดำโทน BBC */
  color: #eeeeee;
  font-family: 'Sarabun', sans-serif;
}

/* ================= 2. NAVBAR (สไตล์ BBC) ================= */
.nav-bar {
  width: 100%;
  background: #0a2c6d; /* สีน้ำเงินเข้ม BBC */
  padding: 15px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 999;
}

.brand { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  font-family: 'Prompt'; 
  font-weight: 600; 
  color: #ffffff; 
  font-size: 1.1rem; 
}

/* ================= 3. HERO (ล็อครูปไม่ให้ล้น) ================= */
.hero-box {
  width: 100%;
  background: #000;
  overflow: hidden;
  line-height: 0;
}

.hero-box img {
  width: 100%;
  height: auto; 
  display: block;
}

/* ================= 4. CONTENT AREA (สไตล์ BBC) ================= */
.container {
  padding: 15px;
  width: 100%;
}

.card {
  background: #1e1e1e; /* สีการ์ดเทาเข้ม BBC */
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.card h2 { 
  color: #4dabff; /* สีฟ้าสว่าง BBC */
  font-family: 'Prompt'; 
  margin-bottom: 10px; 
}

/* ================= 5. CAR GRID & BUTTON (ข้อมูล ThaiRide) ================= */
.car-grid { 
  display: grid; 
  grid-template-columns: repeat(3, 1fr); 
  gap: 10px; 
  margin-top: 20px; 
}

.car-item { 
  background: #2a2a2a; 
  padding: 12px 5px; 
  border-radius: 10px; 
  text-align: center; 
  border-bottom: 3px solid #0a2c6d; /* เส้นใต้สไตล์ Stat Box BBC */
}

.car-item img { 
  width: 100%; 
  max-width: 60px; 
  height: auto; 
}

.btn-line { 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  background: #2e7d32; /* สีเขียวปุ่ม BBC */
  color: #fff; 
  text-decoration: none; 
  padding: 15px; 
  border-radius: 8px; 
  font-family: 'Prompt'; 
  font-weight: bold; 
  width: 100%; 
  margin-top: 20px; 
}

/* ================= 6. FOOTER ================= */
footer {
  background: #0a2c6d;
  color: white;
  text-align: center;
  padding: 40px 20px;
  width: 100%;
}
</style>
</head>

<body>

    <nav class="nav-bar">
        <div class="brand">ThaiRide Travel</div>
    </nav>

    <div class="hero-box">
        <img src="heroslide_01.png">
    </div>

    <div class="container">
        <div class="card">
            <h2>🚐 รับ-ส่งสนามบิน 24 ชม.</h2>
            <p style="color:#aaa;">บริการรถส่วนตัว ราคามาตรฐาน ปลอดภัย ตรงเวลา</p>
            
            <div class="car-grid">
                <div class="car-item"><img src="altis.png"></div>
                <div class="car-item"><img src="suv.png"></div>
                <div class="car-item"><img src="van.png"></div>
            </div>

            <a href="https://line.me/R/ti/p/@775hjmvl" class="btn-line">🟢 จองผ่าน LINE</a>
        </div>
    </div>

    <footer>
        <strong>© 2026 ThaiRide Travel</strong>
        <p style="margin-top:10px; font-size: 13px; opacity: 0.8;">
            บริการรถเช่าพร้อมคนขับ ทั่วไทย
        </p>
    </footer>

</body>
</html>
