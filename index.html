<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThaiRide Travel | Bangkok Airport Transfer</title>

<meta name="description" content="Bangkok Airport Transfer Private Taxi Service Thailand. Book private taxi, safari world tour, floating market tour.">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.hero img{
width:100%;
border-radius:10px;
}

.clock{
position:absolute;
right:20px;
top:20px;
background:rgba(0,0,0,0.6);
padding:10px 18px;
border-radius:8px;
font-size:22px;
}

.booking{
background:#1e293b;
padding:30px;
border-radius:12px;
margin-top:30px;
}

.booking-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.booking input,
.booking select,
.booking textarea{
padding:14px;
border-radius:8px;
border:none;
width:100%;
font-size:15px;
}

.booking textarea{
margin-top:15px;
}

.booking button{
margin-top:15px;
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

.booking button:hover{
background:#16a34a;
}

.stats{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

.qr-section{
margin-top:40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
text-align:center;
}

.qr-section img{
width:150px;
background:white;
padding:10px;
border-radius:10px;
}

footer{
margin-top:40px;
text-align:center;
opacity:0.7;
}

@media(max-width:768px){

.booking-grid{
grid-template-columns:1fr;
}

.qr-section{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h2>ThaiRide Travel</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#">Booking</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<img src="heroslide_01.png">

<div class="clock">
<span id="clock"></span>
</div>

</section>

<!-- BOOKING FORM -->

<section class="booking">

<h2>🚐 Airport Transfer Booking</h2>

<form action="mailto:nine623@gmail.com" method="post" enctype="text/plain">

<div class="booking-grid">

<input type="text" name="Name" placeholder="Your Name" required>

<input type="text" name="Contact" placeholder="LINE / WhatsApp">

<input type="text" name="Pickup" placeholder="Pickup Location">

<input type="text" name="Dropoff" placeholder="Dropoff Location">

<input type="date" name="Date">

<input type="time" name="Time">

<select name="Passengers">
<option>Passengers</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5+</option>
</select>

<select name="Vehicle">
<option>Vehicle</option>
<option>Toyota Altis</option>
<option>SUV</option>
<option>VIP Van</option>
</select>

</div>

<textarea name="Message" placeholder="Additional message"></textarea>

<button type="submit">SEND BOOKING</button>

</form>

<div class="stats">

Visitors Online :
<span id="visitors"></span>

</div>

</section>

<!-- CONTACT QR -->

<section class="qr-section">

<div>
<h3>LINE OA</h3>
<img src="line-qr.png">
</div>

<div>
<h3>WhatsApp</h3>
<img src="whatsapp-qr.png">
</div>

<div>
<h3>WeChat</h3>
<img src="wechat-qr.png">
</div>

</section>

<footer>

© 2026 ThaiRide Travel

</footer>

</div>

<script>

/* CLOCK */

function updateClock(){

let now=new Date();

let h=now.getHours().toString().padStart(2,'0');
let m=now.getMinutes().toString().padStart(2,'0');
let s=now.getSeconds().toString().padStart(2,'0');

document.getElementById("clock").innerHTML=h+":"+m+":"+s;

}

setInterval(updateClock,1000);


/* VISITOR COUNTER */

let count=120+Math.floor(Math.random()*80);

document.getElementById("visitors").innerHTML=count;

</script>

</body>
</html>
