<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ThaiRide Travel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
scroll-behavior:smooth;
}

.container{max-width:1200px;margin:auto;padding:20px}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
}

nav a{
margin-left:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* ===== HERO ===== */
.hero img{
width:100%;
display:none;
border-radius:10px;
}

.hero img.active{
display:block;
}

/* ===== SECTIONS ===== */
section{
margin-top:60px;
}

/* ===== CONTACT ICONS ===== */
.contact-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
text-align:center;
}

.contact-box{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.contact-box img{
width:50px;
height:50px;
margin-bottom:10px;
}

/* ===== FORM ===== */
form{
background:#111827;
padding:20px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
}

/* ===== BUTTON ===== */
button{
background:#00ff9d;
padding:12px;
border:none;
width:100%;
font-weight:bold;
cursor:pointer;
}

/* ===== STICKY ===== */
.sticky{
position:fixed;
bottom:0;
width:100%;
background:#f97316;
text-align:center;
padding:12px;
}

.sticky a{
color:white;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== HEADER ===== -->
<header>
<h2>ThaiRide Travel</h2>

<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#booking">Booking</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- ===== HERO ===== -->
<section id="home" class="hero">
<img src="heroslide_01.png" class="active">
<img src="heroslide_02.png">
<img src="heroslide_03.png">
</section>

<!-- ===== SERVICES ===== -->
<section id="services">
<h2>Services</h2>
<p>Airport Transfer, Private Car, SUV, VIP Van</p>
</section>

<!-- ===== BOOKING FORM (FIXED DISPLAY) ===== -->
<section id="booking">
<h2>Book Your Ride</h2>

<form>
<input type="text" id="name" placeholder="Name">
<input type="text" id="contact" placeholder="Contact">
<input type="text" id="pickup" placeholder="Pickup">
<input type="text" id="dropoff" placeholder="Dropoff">
<input type="date" id="date">
<input type="time" id="time">

<select id="vehicle">
<option>Car</option>
<option>SUV</option>
<option>Van</option>
</select>

<button type="button" onclick="sendBooking()">BOOK NOW</button>
</form>
</section>

<!-- ===== CONTACT (FIXED ICONS) ===== -->
<section id="contact">
<h2>Contact Us</h2>

<div class="contact-grid">

<div class="contact-box">
<img src="line.png">
<h3>LINE</h3>
<p>@thairide</p>
</div>

<div class="contact-box">
<img src="whatsapp.png">
<h3>WhatsApp</h3>
<p>Chat Now</p>
</div>

<div class="contact-box">
<img src="wechat.png">
<h3>WeChat</h3>
<p>Scan QR</p>
</div>

</div>
</section>

</div>

<!-- ===== STICKY BUTTON ===== -->
<div class="sticky">
<a href="#booking">🚐 BOOK NOW</a>
</div>

<!-- ===== SCRIPT ===== -->
<script>

/* HERO SLIDE */
let slides = document.querySelectorAll(".hero img");
let i = 0;

setInterval(()=>{
slides[i].classList.remove("active");
i = (i+1) % slides.length;
slides[i].classList.add("active");
},3000);


/* BOOKING → LINE */
function sendBooking(){

let name=document.getElementById("name").value;
let contact=document.getElementById("contact").value;
let pickup=document.getElementById("pickup").value;
let dropoff=document.getElementById("dropoff").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let vehicle=document.getElementById("vehicle").value;

let msg =
"Name: "+name+"\n"+
"Contact: "+contact+"\n"+
"Pickup: "+pickup+"\n"+
"Dropoff: "+dropoff+"\n"+
"Date: "+date+"\n"+
"Time: "+time+"\n"+
"Vehicle: "+vehicle;

window.open("https://line.me/R/msg/text/?"+encodeURIComponent(msg));

}

</script>

</body>
</html>
