<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThaiRide Travel | New Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ================= CSS จาก BBCCHURCH (ต้นฉบับ) ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden !important; /* ห้ามเลื่อนซ้ายขวา */
  background: #121212; /* พื้นหลังดำ */
  color: #eeeeee;
  font-family: 'Sarabun', sans-serif;
}

/* NAVBAR จาก BBC */
.nav-bar {
  width: 100%;
  background: #0a2c6d;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
}

/* HERO จาก BBC (จุดที่แก้รูปล้น) */
.hero-box {
  width: 100%;
  background: #000;
  overflow: hidden;
  line-height: 0; 
}

.hero-box img {
  width: 100%;
  height: auto; 
  display: block;
}

/* CONTENT AREA จาก BBC */
.container {
  padding: 15px;
  width: 100%;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.card h2 { color: #4dabff; font-family: 'Prompt'; margin-bottom: 10px; }

/* DASHBOARD & GRID (ปรับใช้จาก Stat Box ของ BBC) */
.car-grid {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.car-item {
  flex: 1;
  background: #1e1e1e;
  padding: 12px 5px;
  border-radius: 10px;
  text-align: center;
  border-bottom: 3px solid #0a2c6d; /* สไตล์ขอบล่างของ BBC */
}

.car-item img { width: 100%; max-width: 60px; height: auto; }

/* BUTTON สไตล์ BBC */
.btn-line {
  display: block;
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
  text-decoration: none;
}

/* FOOTER จาก BBC */
footer {
  background: #0a2c6d;
  color: white;
  text-align: center;
  padding: 40px 20px;
  width: 100%;
}
</style>
</head>

<body>

<nav class="nav-bar">
  <span style="font-family:'Prompt'; font-weight:600; color:white;">ThaiRide Travel</span>
</nav>

<div class="hero-box">
  <img src="heroslide_01.png">
</div>

<div class="container">
  <div class="card">
    <h2>🚐 รับ-ส่งสนามบิน 24 ชม.</h2>
    <p style="color:#aaa;">บริการรถส่วนตัว ราคามาตรฐาน ปลอดภัย ตรงเวลา</p>
    
    <div class="car-grid">
      <div class="car-item"><img src="altis.png"></div>
      <div class="car-item"><img src="suv.png"></div>
      <div class="car-item"><img src="van.png"></div>
    </div>
    
    <a href="https://line.me/R/ti/p/@775hjmvl" class="btn-line">🟢 จองผ่าน LINE</a>
  </div>
</div>

<footer>
  <strong>@2026 ThaiRide Travel</strong><br>
  <p style="margin-top:10px; font-size: 13px; opacity: 0.8;">
    บริการรถเช่าพร้อมคนขับ ทั่วไทย
  </p>
</footer>

</body>
</html>
