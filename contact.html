<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ติดต่อจองรถ | Thai Ride Travel</title>

<meta name="description" content="จองรถ VIP Airport Transfer และ Private Tour ผ่าน LINE Official Account ได้ทันที">
<meta name="keywords" content="จองรถ, รถรับส่งสนามบิน, Private Tour Thailand">
<meta name="author" content="Thai Ride Travel">
<meta name="google-site-verification" content="G-V9XCVN1N0W">

<link rel="stylesheet" href="style.css">

<style>
.form-box{
background:#f5f5f5;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

form label{
display:block;
margin-top:15px;
font-weight:500;
}

form input, form select, form textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

form textarea{
resize:none;
}

.sidebar{
position:fixed;
right:10px;
top:120px;
background:#111;
color:#fff;
padding:15px;
border-radius:15px;
width:160px;
font-size:14px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:999;
}

.sidebar div{
margin-bottom:8px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<h2>Thai Ride Travel</h2>
<nav>
<a href="index.html">หน้าแรก</a>
<a href="tour.html">สถานที่ท่องเที่ยว</a>
<a href="contact.html">ติดต่อเรา</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<img src="contact-header.png" alt="Contact Thai Ride Travel">
</section>

<section style="padding:40px;text-align:center;">

<h2>ติดต่อจองรถ</h2>
<p style="font-size:18px;margin-bottom:20px;">
งานด่วน กรุณาทัก LINE Official Account เท่านั้น
</p>

<!-- QR CODE -->
<div style="margin-bottom:30px;">
<img src="line-qr.png" alt="LINE QR" style="width:220px;border-radius:15px;">
<br><br>
<a href="https://lin.ee/zmoafDZ" class="book-btn">ทัก LINE เพื่อจองรถ</a>
</div>

<!-- FORM -->
<div class="form-box" style="max-width:600px;margin:0 auto;text-align:left;">
<form id="bookingForm">

<label>ชื่อผู้จอง</label>
<input type="text" id="name" required>

<label>วันที่เดินทาง</label>
<input type="date" id="travelDate" required>

<label>เวลาเดินทาง</label>
<input type="time" id="travelTime" required>

<label>จุดรับ</label>
<input type="text" id="pickup" required>

<label>จุดส่ง</label>
<input type="text" id="dropoff" required>

<label>ประเภทรถ</label>
<select id="car" required>
<option>Alphard</option>
<option>Camry</option>
<option>SUV</option>
<option>Van</option>
</select>

<label>จำนวนผู้โดยสาร</label>
<input type="number" id="passenger" min="1" required>

<label>หมายเหตุเพิ่มเติม</label>
<textarea id="note" rows="4"></textarea>

<button type="submit" class="book-btn" style="width:100%;margin-top:20px;">
ส่งข้อมูล
</button>

</form>
</div>

</section>

<!-- SIDEBAR WATCH -->
<div class="sidebar">
<div id="dateDisplay"></div>
<div id="timeDisplay"></div>
<div id="visits"></div>
<div id="country"></div>
<div style="text-align:center;">✈️</div>
</div>

<!-- FOOTER -->
<footer>
<p>© 2025 Thai Ride Travel</p>
</footer>

<script>
/* ===== CLOCK ===== */
function updateClock(){
let now = new Date();

let date = now.toLocaleDateString("th-TH");
let time = now.toLocaleTimeString("th-TH");

document.getElementById("dateDisplay").innerHTML = "📅 " + date;
document.getElementById("timeDisplay").innerHTML = "⏰ " + time;
}

setInterval(updateClock,1000);
updateClock();

/* ===== VISIT COUNTER (LocalStorage) ===== */
if(localStorage.getItem("visits")==null){
localStorage.setItem("visits",1);
}else{
let count = parseInt(localStorage.getItem("visits"));
localStorage.setItem("visits",count+1);
}

document.getElementById("visits").innerHTML =
"👥 Visits: " + localStorage.getItem("visits");

/* ===== COUNTRY (IP API) ===== */
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").innerHTML =
"🌍 " + data.country_name;
});

/* ===== SEND TO LINE ===== */
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let date = document.getElementById("travelDate").value;
let time = document.getElementById("travelTime").value;
let pickup = document.getElementById("pickup").value;
let dropoff = document.getElementById("dropoff").value;
let car = document.getElementById("car").value;
let passenger = document.getElementById("passenger").value;
let note = document.getElementById("note").value;

let message =
"🚗 Thai Ride Booking\n\n" +
"ชื่อ: " + name + "\n" +
"วันที่: " + date + "\n" +
"เวลา: " + time + "\n" +
"จุดรับ: " + pickup + "\n" +
"จุดส่ง: " + dropoff + "\n" +
"ประเภทรถ: " + car + "\n" +
"ผู้โดยสาร: " + passenger + "\n" +
"หมายเหตุ: " + note;

let lineURL = "https://line.me/R/msg/text/?" + encodeURIComponent(message);

window.open(lineURL,"_blank");
});
</script>

</body>
</html>
