<style>

body{

.container{
max-width:1200px;
margin:auto;
padding:20px;

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{

}

}

}

.ad{
background:#1e40af;
text-align:center;
padding:16px;
margin:25px 0;
border-radius:8px;
font-weight:bold;
}

.hero{
position:relative;
}

.hero img{
width:100%;
border-radius:10px;
display:none;
}

.hero img.active{
display:block;
}

.hero-text{
position:absolute;
top:35%;
left:50px;
}

.hero-text h1{

}

.book-btn{

padding:12px 26px;
border-radius:6px;
text-decoration:none;

font-weight:bold;
}

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.service-box{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.service-box img{
width:60px;
}

.vehicle-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.vehicle{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.vehicle img{
width:100%;
}

.tour-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.tour img{
width:100%;
border-radius:10px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.gallery-grid img{
width:100%;
border-radius:6px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:40px;
text-align:center;
}

.stat{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.stat h2{
font-size:34px;
color:#38bdf8;
}

.review-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.review{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;

}

.qr-grid img{

}

.footer-contact{
margin-top:60px;
background:#020617;
padding:40px 20px;

}

.footer-logo img{

}

.contact-links{

justify-content:center;

}

.contact-links a{

text-decoration:none;
font-weight:bold;
}

.footer-bottom{
margin-top:20px;
opacity:.7;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
}

.services,
.vehicle-grid,
.tour-grid,
.gallery-grid,
.stats,
.review-grid,
.qr-grid{
grid-template-columns:1fr;
}

.contact-links{
flex-direction:column;
gap:10px;
}

.hero-text{
left:20px;
}

.hero-text h1{
font-size:26px;
}

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<div class="logo-text">ThaiRide Travel</div>
</div>

<div class="clock" id="clock"></div>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Tours</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

</header>

<div class="ad">AD Banner 728x90</div>

<section class="hero">

<img src="heroslide_01.png" class="active">
<img src="heroslide_02.png">
<img src="heroslide_03.png">

<div class="hero-text">
<h1>Bangkok Airport Transfer</h1>
<a href="#" class="book-btn">BOOK NOW</a>
</div>

</section>

</div>

<script>

let slide=0
let slides=document.querySelectorAll(".hero img")

function showSlide(){

slides.forEach(s=>s.classList.remove("active"))

slide++

if(slide>=slides.length){
slide=0
}

slides[slide].classList.add("active")

}

setInterval(showSlide,4000)

function updateClock(){

let now=new Date()

let date=now.toLocaleDateString('en-US',{
year:'numeric',
month:'long',
day:'numeric'
})

let time=now.toLocaleTimeString('en-US')

document.getElementById("clock").innerHTML=date+" | "+time

}

setInterval(updateClock,1000)
updateClock()

</script>

</body>
