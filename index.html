<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Ride Travel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    position: relative;
    height: 450px;
    background: url('hero_01.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

.hero-buttons a {
    text-decoration: none;
    padding: 10px 20px;
    margin: 0 8px;
    border-radius: 6px;
    font-weight: bold;
    color: white;
}

.btn-green { background: #28a745; }
.btn-blue { background: #007bff; }

/* CONTACT FORM */
.contact {
    padding: 60px 20px;
    text-align: center;
    background: #f4f4f4;
}

.contact h2 {
    margin-bottom: 30px;
}

form {
    max-width: 500px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    padding: 12px 25px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<header class="hero">
    <div class="hero-content">
        <h1>Safari World Bangkok</h1>
        <p>Wild Adventure Awaits</p>
        <div class="hero-buttons">
            <a href="#" class="btn-green">View Attractions</a>
            <a href="#" class="btn-blue">Show Schedule</a>
        </div>
    </div>
</header>

<section class="contact">
    <h2>Contact / Booking</h2>

    <form action="https://formsubmit.co/701ccff07f0e8ba67ba495a336f05c45" method="POST">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>

    </form>
</section>

</body>
</html>
