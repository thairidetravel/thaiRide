<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiRide - Airport Transfer</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
}

/* จัดให้อยู่กลางแนวตั้ง แต่ไม่ชิดล่างเกิน */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;   /* เปลี่ยนจาก center */
  align-items:center;
  padding-top:80px;             /* กำหนดระยะขอบบนใหม่ */
  text-align:center;
}

h1{
  font-size:40px;
  margin-bottom:10px;
  color:#00ff88;
}

.subtitle{
  font-size:18px;
  color:#aaa;
  margin-bottom:30px;
}

.button{
  display:inline-block;
  margin:15px;
  padding:18px 45px;
  font-size:20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.call{
  background:#ff0000;
  color:white;
}

.call:hover{
  background:#cc0000;
}

.qr-box{
  margin-top:25px;
}

.qr-box p{
  color:#aaa;
  margin-bottom:15px;
}

.qr-box img{
  width:220px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

.qr-box img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <h1>ThaiRide</h1>
  <div class="subtitle">Airport Transfer Service</div>

  <a href="https://lin.ee/MqSk0kZy" target="_blank" class="button call">
    CALL TAXI NOW
  </a>

  <div class="qr-box">
    <p>Scan or Tap QR to Book via LINE</p>
    <a href="https://lin.ee/MqSk0kZy" target="_blank">
      <img src="qr-line.png" alt="LINE QR">
    </a>
  </div>

</div>

</body>
</html>
