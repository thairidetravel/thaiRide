<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiang Mai Airport Taxi</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7));
  padding: 20px;
}

.hero-content {
  max-width: 500px;
}

h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  margin-bottom: 25px;
  color: #ccc;
}

.cta-btn {
  background: #e60000;
  color: white;
  padding: 15px 35px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
  display: inline-block;
  transition: 0.3s;
}

.cta-btn:hover {
  background: #cc0000;
  transform: scale(1.05);
}

.qr-box {
  margin-top: 35px;
}

.qr-box img {
  width: 220px;
  border-radius: 15px;
  background: white;
  padding: 10px;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">

    <h1>Chiang Mai Airport Taxi</h1>
    <p>Private VIP Transfer Service</p>

    <!-- 🔴 ปุ่มแดงเปิด LINE -->
    <a href="https://line.me/ti/p/XXXXXXXX" target="_blank" class="cta-btn">
      CALL TAXI NOW
    </a>

    <div class="qr-box">
      <p>Scan to Book via LINE</p>
      <img src="line-qr.png" alt="LINE QR Code">
    </div>

  </div>
</section>

</body>
</html>
