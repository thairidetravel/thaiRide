<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
position:relative;
margin-top:20px;
}

.hero img{
width:100%;
border-radius:10px;
}

.clock{
position:absolute;
top:20px;
right:20px;
font-size:28px;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}

/* SCROLL TEXT */

.scroll{
overflow:hidden;
white-space:nowrap;
margin-top:25px;
}

.scroll span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
color:#38bdf8;
font-size:22px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* VISITOR DASHBOARD */

.visitor-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
text-align:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
}

.card h3{
margin:0;
font-size:30px;
color:#38bdf8;
}

.card p{
margin-top:10px;
opacity:0.8;
}

/* MAP */

.map{
margin-top:30px;
text-align:center;
}

/* LINE BUTTON */

.line-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:40px;
text-align:center;
opacity:0.7;
}

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
}

.visitor-box{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
<h1>ThaiRide Travel</h1>
</div>

<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
</nav>

</header>

<section class="hero">

<img src="hero_01.png">

<div class="clock" id="clock"></div>

</section>

<div class="scroll">
<span>
Premium Airport Transfer • Safari World Tour • Floating Market Tour • Bangkok Private Car Service
</span>
</div>

<section id="gallery">

<h2>Photo Gallery</h2>

<div class="gallery">

<img src="G-01.png" loading="lazy">
<img src="G-02.png" loading="lazy">
<img src="G-03.png" loading="lazy">
<img src="G-04.png" loading="lazy">
<img src="hero_05.png" loading="lazy">
<img src="hero_06.png" loading="lazy">
<img src="hero_07.png" loading="lazy">
<img src="hero_08.png" loading="lazy">
<img src="hero_09.png" loading="lazy">

</div>

</section>

<!-- VISITOR DASHBOARD -->

<section>

<h2 style="text-align:center;margin-top:40px;">
🌍 Visitors Around The World
</h2>

<div class="visitor-box">

<div class="card">
<h3>👥</h3>
<p>Total Visitors</p>
<script async src="https://api.countapi.xyz/hit/thairide/visits?callback=websiteVisits"></script>
<h3 id="visits">Loading</h3>
</div>

<div class="card">
<h3>📱</h3>
<p>Device</p>
<h3 id="device"></h3>
</div>

<div class="card">
<h3>🌐</h3>
<p>Browser</p>
<h3 id="browser"></h3>
</div>

</div>

<!-- WORLD MAP -->

<div class="map">

<script type="text/javascript"
src="//rf.revolvermaps.com/0/0/8.js?i=5c8xg1x7k0m&m=0&c=ff0000&cr1=ffffff&f=arial&l=0">
</script>

</div>

</section>

<footer>

©2026 ThaiRide Travel

</footer>

</div>

<a href="https://line.me/R/ti/p/@775hjmvl" class="line-btn">
LINE Booking
</a>

<script>

function updateClock(){
let now = new Date();
let time = now.toLocaleTimeString();
document.getElementById("clock").innerHTML = time;
}
updateClock();
setInterval(updateClock,1000);

/* VISIT COUNTER */

function websiteVisits(response) {
document.querySelector("#visits").textContent = response.value;
}

/* DEVICE DETECT */

let device = "Desktop";

if(/Android/i.test(navigator.userAgent)) device="Android";
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)) device="iOS";

document.getElementById("device").innerHTML=device;

/* BROWSER */

let browser="Unknown";

if(navigator.userAgent.indexOf("Chrome")>-1) browser="Chrome";
if(navigator.userAgent.indexOf("Safari")>-1) browser="Safari";
if(navigator.userAgent.indexOf("Firefox")>-1) browser="Firefox";

document.getElementById("browser").innerHTML=browser;

</script>

</body>
</html>
