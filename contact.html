<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - ThaiRide Travel</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
background:#0d6efd;
color:white;
text-align:center;
padding:40px 20px;
}

.header h1{
margin:0;
font-size:32px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#06c755;
color:white;
border:none;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#05b04c;
}

.linebtn{
display:block;
text-align:center;
background:#06c755;
color:white;
padding:16px;
border-radius:10px;
font-size:20px;
text-decoration:none;
margin-top:20px;
}

.linebtn:hover{
background:#05b04c;
}

.note{
text-align:center;
margin-top:10px;
color:#777;
}

</style>
</head>

<body>

<div class="header">
<h1>จองรถกับ ThaiRide Travel</h1>
<p>กรอกข้อมูล แล้วกดส่งไป LINE</p>
</div>

<div class="container">

<div class="card">

<form id="bookingForm">

<label>ชื่อผู้จอง</label>
<input type="text" id="name" required>

<label>วันที่ใช้รถ</label>
<input type="date" id="date" required>

<label>สถานที่รับ</label>
<input type="text" id="pickup">

<label>สถานที่ส่ง</label>
<input type="text" id="drop">

<label>จำนวนผู้โดยสาร</label>
<input type="number" id="people">

<label>รายละเอียดเพิ่มเติม</label>
<textarea id="note"></textarea>

<button type="submit">
ส่งข้อมูลไป LINE
</button>

</form>

<a class="linebtn"
href="https://line.me/ti/p/@775hjmvl"
target="_blank">
แชท LINE ThaiRide ทันที
</a>

<p class="note">
งานด่วน กรุณาทัก LINE
</p>

</div>

</div>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

var name=document.getElementById("name").value;
var date=document.getElementById("date").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;
var people=document.getElementById("people").value;
var note=document.getElementById("note").value;

var message=
"จองรถ ThaiRide Travel%0A"+
"ชื่อ : "+name+"%0A"+
"วันที่ : "+date+"%0A"+
"รับจาก : "+pickup+"%0A"+
"ส่งที่ : "+drop+"%0A"+
"ผู้โดยสาร : "+people+" คน%0A"+
"รายละเอียด : "+note;

var lineURL="https://line.me/R/msg/text/?"+message;

window.open(lineURL);

});

</script>

</body>
</html>
