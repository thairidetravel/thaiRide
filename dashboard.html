<!DOCTYPE html>
<html>

<head>

<title>ThaiRide Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

h1{
color:#0a8f3d;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#0a8f3d;
color:white;
}

</style>

</head>

<body>

<h1>ThaiRide Dashboard</h1>

<h2>Visitors</h2>

<div id="visitors"></div>

<h2>Bookings</h2>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Pickup</th>
<th>Destination</th>
<th>Date</th>
</tr>

<tbody id="bookingTable"></tbody>

</table>

<script>

document.getElementById("visitors").innerHTML =
localStorage.getItem("visits");

let bookings =
JSON.parse(localStorage.getItem("bookings")) || [];

let html="";

bookings.forEach(function(b){

html+=`
<tr>
<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.pickup}</td>
<td>${b.destination}</td>
<td>${b.date}</td>
</tr>
`;

});

document.getElementById("bookingTable").innerHTML = html;

</script>

</body>

</html>
