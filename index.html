<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiRide | Premium Airport Transfer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:black;
  overflow:hidden;
}

/* พื้นหลังรูปรถ */
.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('car-bg.jpg') center/cover no-repeat;
  opacity:0.15;
  z-index:-2;
}

/* เอฟเฟกต์แสง */
.light-effect{
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 30% 30%, rgba(0,255,150,0.15), transparent 60%);
  animation:moveLight 8s linear infinite;
  z-index:-1;
}

@keyframes moveLight{
  0%{transform:translate(-20%,-20%);}
  50%{transform:translate(10%,10%);}
  100%{transform:translate(-20%,-20%);}
}

.container{
  text-align:center;
  padding-top:70px;
  width:90%;
  max-width:500px;
}

h1{
  font-size:38px;
  font-weight:700;
  background:linear-gradient(90deg,#00ff88,#00c853);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:10px;
  font-size:16px;
  color:#bbb;
  margin-bottom:30px;
}

.button{
  display:inline-block;
  padding:16px 45px;
  font-size:16px;
  font-weight:600;
  border-radius:50px;
  text-decoration:none;
  transition:0.3s;
  margin-bottom:20px;
}

.call{
  background:linear-gradient(45deg,#ff0000,#ff3b3b);
  color:white;
  box-shadow:0 10px 25px rgba(255,0,0,0.4);
}

.call:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 35px rgba(255,0,0,0.6);
}

.qr-box img{
  width:200px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,255,136,0.3);
  cursor:pointer;
  transition:0.3s;
}

.qr-box img:hover{
  transform:scale(1.05);
}

.language-switch{
  margin-top:25px;
}

.lang-btn{
  background:none;
  border:1px solid #00ff88;
  color:#00ff88;
  padding:6px 15px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

.lang-btn:hover{
  background:#00ff88;
  color:black;
}

/* iPhone Responsive */
@media(max-width:480px){
  h1{font-size:32px;}
  .button{padding:14px 35px;font-size:15px;}
  .qr-box img{width:170px;}
}
</style>
</head>

<body>

<div class="background"></div>
<div class="light-effect"></div>

<div class="container">

  <h1 id="title">ThaiRide</h1>
  <div class="subtitle" id="subtitle">Premium Airport Transfer Service</div>

  <a href="https://lin.ee/MqSk0kZy" target="_blank" class="button call" id="callBtn">
    CALL TAXI NOW
  </a>

  <div class="qr-box">
    <p id="scanText">Scan or Tap QR to Book via LINE</p>
    <a href="https://lin.ee/MqSk0kZy" target="_blank">
      <img src="qr-line.png" alt="LINE QR">
    </a>
  </div>

  <div class="language-switch">
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('th')">🇹🇭 ไทย</button>
  </div>

</div>

<script>
function setLang(lang){
  if(lang === 'th'){
    document.getElementById('subtitle').innerText = "บริการรับส่งสนามบินระดับพรีเมียม";
    document.getElementById('callBtn').innerText = "เรียกรถตอนนี้";
    document.getElementById('scanText').innerText = "สแกนหรือแตะ QR เพื่อจองผ่าน LINE";
  }else{
    document.getElementById('subtitle').innerText = "Premium Airport Transfer Service";
    document.getElementById('callBtn').innerText = "CALL TAXI NOW";
    document.getElementById('scanText').innerText = "Scan or Tap QR to Book via LINE";
  }
}
</script>

</body>
</html>
