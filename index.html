<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Ride Travel</title>

<!-- SEO -->
<meta name="description" content="บริการรถรับส่งสนามบิน และท่องเที่ยวทั่วไทย">

<meta name="author" content="Thai Ride Travel">
<meta name="google-site-verification" content="G-V9XCVN1N0W">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h1>Thai Ride Travel</h1>
    <nav>
        <a href="index.html">หน้าแรก</a>
        <a href="contact.html">ติดต่อเรา</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <img src="hero_01.png" alt="บริการรถรับส่ง">
</section>

<!-- CAR SECTION -->
<section class="car-grid">
    <div class="car">
        <img src="hero_01.png" alt="">
        <h3>Airport Transfer</h3>
        <p>บริการรับส่งสนามบิน 24 ชั่วโมง</p>

    <div class="car">

        <h3>Private Tour</h3>
        <p>บริการรถพาเที่ยวทั่วไทย</p>

</section>

<!-- REVIEW -->
<section class="reviews">

        ⭐⭐⭐⭐⭐ บริการดีมาก ตรงเวลา

    </div>
</section>

<!-- SIDEBAR WIDGET -->
<div class="widget">
    <div id="clock"></div>
    <img src="line-qr.png" width="150">
</div>

<!-- FLOAT BUTTON -->
<a href="contact.html" class="line-float">จองรถ</a>

<!-- FOOTER -->
<footer>
    <p>© 2025 Thai Ride Travel</p>
</footer>

<script>
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();
</script>
